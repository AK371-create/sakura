<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf8f7"/>
      <stop offset="100%" stop-color="#f4ecee"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="20%" r="50%">
      <stop offset="0%" stop-color="rgba(214, 37, 56, 0.12)"/>
      <stop offset="100%" stop-color="rgba(214, 37, 56, 0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark (sakura petal style) -->
  <g transform="translate(120, 120)" fill="#d62538">
    <circle cx="60" cy="60" r="58" fill="none" stroke="#d62538" stroke-width="3"/>
    <path d="M60 5 C 45 25, 45 50, 60 60 C 75 50, 75 25, 60 5 Z"/>
    <path d="M60 115 C 75 95, 75 70, 60 60 C 45 70, 45 95, 60 115 Z" opacity="0.6"/>
  </g>

  <!-- Tagline -->
  <text x="120" y="340" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500" fill="#6b6360" letter-spacing="2">
    JAPANESE MLB / 2026 SEASON
  </text>

  <!-- Main title -->
  <text x="120" y="430" font-family="Inter, system-ui, sans-serif" font-size="92" font-weight="800" fill="#1a1614" letter-spacing="-2">SakuraBall</text>

  <!-- Sub -->
  <text x="120" y="495" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="500" fill="#1a1614">日本人MLB、データで読む。</text>

  <!-- URL -->
  <text x="120" y="570" font-family="JetBrains Mono, monospace" font-size="22" fill="#9c948f">sakuraballpark.com</text>

  <!-- Decorative right side: stats grid -->
  <g transform="translate(720, 130)" font-family="JetBrains Mono, monospace" fill="#1a1614">
    <text x="0" y="0" font-size="18" fill="#9c948f" letter-spacing="1">PLAYERS</text>
    <text x="0" y="50" font-size="80" font-weight="700" fill="#d62538">26</text>
    <text x="200" y="0" font-size="18" fill="#9c948f" letter-spacing="1">ARTICLES</text>
    <text x="200" y="50" font-size="80" font-weight="700">40</text>
    <text x="0" y="160" font-size="18" fill="#9c948f" letter-spacing="1">SEASONS</text>
    <text x="0" y="210" font-size="80" font-weight="700">1995-26</text>
  </g>
</svg>
